server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: recipe-platform-backend
  servlet:
    multipart:
      enabled: true
      max-request-size: 3MB
      max-file-size: 2MB

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/recipehub?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Email Configuration (Gmail SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${email}
    password: ${email_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    default-encoding: UTF-8

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

logging:
  level:
    com.recipeplatform: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

app:
  jwt:
    secret: ${JWT_SECRET:yourSecretKeyForJWTTokenMustBe256BitsLong!}
    expiration: ${JWT_EXPIRATION:86400000}

  file-upload:
    dir:  upload/images



